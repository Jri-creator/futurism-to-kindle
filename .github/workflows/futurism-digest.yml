name: Futurism Kindle Digest

on:
  schedule:
    # Runs once daily at 12:00 UTC. Adjust as you like.
    - cron: "0 12 * * *"
  workflow_dispatch: {}  # lets you trigger it manually from the Actions tab

permissions:
  contents: write  # needed to commit sent.json back to the repo

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build digest and send to Kindle
        env:
          REK: ${{ secrets.REK }}
          KINDLE_EMAIL: ${{ secrets.KINDLE_EMAIL }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          MAX_ARTICLES_PER_RUN: "10"
        run: python scripts/build_and_send.py

      - name: Commit updated sent.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sent.json
          git diff --staged --quiet && echo "No changes to commit." || git commit -m "Update sent.json [skip ci]"
          git push
